# ── SECURITY HEADERS ────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Clickjacking prevention
    X-Frame-Options = "DENY"
    # MIME-type sniffing prevention
    X-Content-Type-Options = "nosniff"
    # XSS filter (legacy browsers)
    X-XSS-Protection = "1; mode=block"
    # Don't leak referrer to external sites
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Force HTTPS for 2 years, include subdomains
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Disable unnecessary browser features
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=(), bluetooth=()"
    # Content Security Policy
    Content-Security-Policy = "default-src 'none'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://images.unsplash.com https://mistermortgageusa.com https://*.tile.openstreetmap.org https://lh3.googleusercontent.com; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;"

# Cache static assets aggressively, never cache HTML
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/scripts/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[dev]
  command = "npm run dev"
  port    = 4321
